<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>参加者オーバーレイ</title>
  <style>
    /* OBSブラウザソース用。背景は透過にして配信画面に重ねる。 */
    :root {
      --text: #ffffff;
      --blue: #1e6bff;
      --orange: #ff7a18;
      --accent: #2b6cff;
      --radius: 16px;
      --panel-alpha: 0.92;
      --comment-size: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: "Inter", "Helvetica Neue", "Segoe UI", "Hiragino Kaku Gothic ProN",
        "Hiragino Sans", "Noto Sans JP", sans-serif;
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { position: absolute; top: 24px; right: 24px; width: 340px; }

    /* 統計 */
    .stats { display: flex; gap: 8px; margin-bottom: 12px; }
    .stat {
      flex: 1;
      background: linear-gradient(180deg, rgba(17,20,33,var(--panel-alpha)), rgba(11,13,22,var(--panel-alpha)));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: calc(var(--radius) * 0.7);
      padding: 9px 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,.4);
    }
    .stat .label { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; opacity: .55; font-weight: 700; }
    .stat .value { font-size: 24px; font-weight: 800; margin-top: 1px; line-height: 1.05;
      font-variant-numeric: tabular-nums; letter-spacing: -.01em; }

    /* パネル共通：ダークグラス＋色アクセント */
    .panel {
      border-radius: var(--radius); overflow: hidden; margin-bottom: 10px;
      background: linear-gradient(180deg, rgba(17,20,33,var(--panel-alpha)), rgba(11,13,22,var(--panel-alpha)));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
    }
    .panel-head {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px 9px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .panel-head .mark { width: 4px; height: 15px; border-radius: 2px; flex: none; }
    .panel-head .title { font-weight: 800; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
    .panel-head .cap {
      margin-left: auto; font-size: 12px; font-weight: 700; opacity: .65;
      font-variant-numeric: tabular-nums; letter-spacing: .04em;
    }
    .panel.blue { --c: var(--blue); }
    .panel.orange { --c: var(--orange); }
    .panel.wait { --c: var(--accent); }
    .panel.comments { --c: var(--accent); }
    .panel .mark { background: var(--c); }
    .panel .title { color: color-mix(in srgb, var(--c) 45%, #ffffff); }

    /* メンバー */
    .list { list-style: none; padding: 7px; }
    .item {
      display: flex; align-items: center; gap: 10px; padding: 6px 9px; margin: 4px 0;
      background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.05);
      border-radius: 9px; min-height: 38px; animation: slideIn .28s ease;
    }
    .item.empty { background: rgba(255,255,255,.02); border-style: dashed; border-color: rgba(255,255,255,.12); }
    .avatar {
      width: 26px; height: 26px; border-radius: 50%; flex: none; object-fit: cover;
      background: rgba(255,255,255,.1);
    }
    .avatar.initial {
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: rgba(255,255,255,.85);
      background: rgba(255,255,255,.12);
    }
    .item .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item.empty .name { opacity: .3; font-weight: 500; }
    .num {
      width: 20px; flex: none; text-align: center;
      font-size: 12px; font-weight: 800; color: rgba(255,255,255,.4);
      font-variant-numeric: tabular-nums;
    }

    /* コメント（縦一覧） */
    .clist { list-style: none; padding: 7px; max-height: 60vh; overflow: hidden; }
    .crow {
      display: flex; align-items: flex-start; gap: 9px; padding: 6px 9px; margin: 4px 0;
      background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.05);
      border-radius: 9px; animation: slideIn .28s ease;
    }
    .crow .cbody { min-width: 0; }
    .crow .cname { font-size: calc(var(--comment-size) * 0.72); font-weight: 800; opacity: .7;
      color: color-mix(in srgb, var(--accent) 40%, #ffffff); display: block; }
    .crow .ctext { font-size: var(--comment-size); font-weight: 600; word-break: break-word; line-height: 1.35; }
    .crow.owner .cname { color: #ffd24a; }
    .crow.mod .cname { color: color-mix(in srgb, var(--blue) 45%, #ffffff); }

    /* コメント（横流れ／弾幕） */
    .ticker { position: relative; width: 100%; height: 60px; overflow: hidden; pointer-events: none; }
    .dm {
      position: absolute; left: 0; white-space: nowrap; display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 999px;
      background: rgba(10,12,20,.66); border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 3px 12px rgba(0,0,0,.4); will-change: transform;
      font-weight: 700; font-size: var(--comment-size); backdrop-filter: blur(2px);
    }
    .dm .cname { font-size: calc(var(--comment-size) * 0.75); opacity: .7; font-weight: 800;
      color: color-mix(in srgb, var(--accent) 40%, #ffffff); }
    .dm.owner { border-color: rgba(255,210,74,.5); }
    .dm.owner .cname { color: #ffd24a; }

    /* 表示/非表示 */
    body.no-avatars .avatar { display: none; }
    body.no-numbers .num { display: none; }
    .hidden { display: none !important; }

    /* VS 区切り */
    .vs { display: flex; align-items: center; gap: 12px; margin: 4px 4px 8px; }
    .vs::before, .vs::after { content: ""; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent); }
    .vs span { font-weight: 900; font-size: 13px; letter-spacing: .22em; opacity: .8; }

    .empty-wait { padding: 14px; text-align: center; opacity: .45; font-size: 12px; }

    @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
    .flash { animation: flash .6s ease; }
    @keyframes flash { 0% { box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 70%, transparent); } 100% { box-shadow: 0 10px 30px rgba(0,0,0,.45); } }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="stats" id="statsRow">
      <div class="stat" id="statSubs"><div class="label">Subscribers</div><div class="value" id="subs">—</div></div>
      <div class="stat" id="statViewers"><div class="label">Live Viewers</div><div class="value" id="viewers">—</div></div>
    </div>

    <div class="panel blue" id="panelBlue">
      <div class="panel-head"><span class="mark"></span><span class="title" id="labelBlue">青チーム</span><span class="cap" id="capBlue">0/3</span></div>
      <ul class="list" id="blue"></ul>
    </div>
    <div class="vs" id="vs"><span>VS</span></div>
    <div class="panel orange" id="panelOrange">
      <div class="panel-head"><span class="mark"></span><span class="title" id="labelOrange">オレンジチーム</span><span class="cap" id="capOrange">0/3</span></div>
      <ul class="list" id="orange"></ul>
    </div>

    <div class="panel wait" id="panelWait">
      <div class="panel-head"><span class="mark"></span><span class="title" id="labelWait">参加希望（待機列）</span><span class="cap" id="capWait">0</span></div>
      <ul class="list" id="queue"></ul>
    </div>

    <!-- コメント：縦一覧 -->
    <div class="panel comments" id="panelComments">
      <div class="panel-head"><span class="mark"></span><span class="title" id="labelComments">コメント</span></div>
      <ul class="clist" id="commentList"></ul>
    </div>
    <!-- コメント：横流れ -->
    <div class="ticker" id="ticker"></div>
  </div>

  <script src="/socket.io.min.js"></script>
  <script>
    const socket = io();
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => (n == null ? "—" : Number(n).toLocaleString("ja-JP"));
    const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    // 表示するウィンドウ: all | stats | teams | blue | orange | waiting | comments
    const VIEW = (new URLSearchParams(location.search).get("view") || "all").toLowerCase();

    let SET = null;
    let lastState = null;
    let comments = [];
    // 横流れ（1レーン・同じ高さ・待機停止対応）の状態
    const TICKER_GAP = 26;
    let lane = [];
    let tickerRaf = null;
    let tickerLastTs = 0;

    function avatarHtml(e) {
      if (e.photo) return `<img class="avatar" src="${e.photo}"/>`;
      const ch = (e.name || "?").trim().charAt(0).toUpperCase() || "?";
      return `<div class="avatar initial">${esc(ch)}</div>`;
    }
    function memberHtml(e, i) {
      const num = i != null ? `<span class="num">${i + 1}</span>` : "";
      return `<li class="item">${num}${avatarHtml(e)}<span class="name">${esc(e.name)}</span></li>`;
    }
    function emptySlot() {
      return `<li class="item empty"><div class="avatar"></div><span class="name">空き</span></li>`;
    }
    function renderTeam(elId, capId, members, size, showEmpty) {
      let html = members.map((e) => memberHtml(e)).join("");
      if (showEmpty) for (let k = members.length; k < size; k++) html += emptySlot();
      $(elId).innerHTML = html;
      $(capId).textContent = `${members.length}/${size}`;
    }

    function render(s) {
      lastState = s;
      $("subs").textContent = fmt(s.subscriberCount);
      $("viewers").textContent = fmt(s.concurrentViewers);
      const size = s.teamSize || 3;
      const showEmpty = SET ? SET.show.emptySlots : true;
      renderTeam("blue", "capBlue", s.blue || [], size, showEmpty);
      renderTeam("orange", "capOrange", s.orange || [], size, showEmpty);
      const q = s.queue || [];
      $("capWait").textContent = q.length;
      $("queue").innerHTML = q.length
        ? q.map((e, i) => memberHtml(e, i)).join("")
        : '<li class="empty-wait">「参加希望」コメントを待機中…</li>';
      if (Array.isArray(s.comments)) { comments = s.comments.slice(); renderCommentList(); }
    }

    // コメント：縦一覧
    function commentRowHtml(c) {
      const cls = c.isOwner ? " owner" : c.isModerator ? " mod" : "";
      const photo = SET && SET.comments.showPhoto ? avatarHtml(c) : "";
      return `<li class="crow${cls}">${photo}<div class="cbody"><span class="cname">${esc(c.name)}</span><span class="ctext">${esc(c.text)}</span></div></li>`;
    }
    function renderCommentList() {
      if (!SET || SET.comments.mode !== "list") return;
      const max = SET.comments.max || 8;
      const items = comments.slice(-max);
      const el = $("commentList");
      el.innerHTML = items.map(commentRowHtml).join("");
      el.scrollTop = el.scrollHeight;
    }

    // コメント：横流れ（1レーン／同じ高さ／後続が無ければ画面上で停止して待機）
    function enqueueTicker(c) {
      if (!SET || SET.comments.mode !== "ticker" || !SET.comments.show) return;
      if (VIEW !== "all" && VIEW !== "comments") return;
      const ticker = $("ticker");
      const el = document.createElement("div");
      el.className = "dm" + (c.isOwner ? " owner" : "");
      const photo = SET.comments.showPhoto ? avatarHtml(c) : "";
      el.innerHTML = `${photo}<span class="cname">${esc(c.name)}</span><span class="ctext">${esc(c.text)}</span>`;
      ticker.appendChild(el);
      const w = el.offsetWidth;
      const W = ticker.clientWidth || window.innerWidth;
      // 直前の要素に重ならない位置から開始（詰まっていれば画面右の外で順番待ち）
      const prev = lane[lane.length - 1];
      const startX = prev ? Math.max(W, prev.x + prev.w + TICKER_GAP) : W;
      el.style.top = Math.max(0, (ticker.clientHeight - el.offsetHeight) / 2) + "px";
      el.style.transform = `translateX(${startX}px)`;
      lane.push({ el, x: startX, w });
      if (tickerRaf == null) { tickerLastTs = performance.now(); tickerRaf = requestAnimationFrame(tickerStep); }
    }

    function tickerStep(now) {
      const ticker = $("ticker");
      const W = ticker.clientWidth || window.innerWidth;
      const dt = Math.min(50, now - tickerLastTs); tickerLastTs = now;
      const sec = (SET && SET.comments.speed) || 12;
      const v = W / (sec * 1000); // px/ms（画面端→端を sec 秒で）
      const restX = 12; // 停止位置（左端）
      let moved = false;
      for (let i = 0; i < lane.length; i++) {
        const c = lane[i];
        const before = c.x;
        let nx = c.x - v * dt;
        // 前(左)の要素に重ならない
        if (i > 0) {
          const ahead = lane[i - 1];
          const minByAhead = ahead.x + ahead.w + TICKER_GAP;
          if (nx < minByAhead) nx = minByAhead;
        }
        // 後続が無い最新コメントは画面上で停止して待機
        if (i === lane.length - 1 && nx < restX) nx = restX;
        c.x = nx;
        c.el.style.transform = `translateX(${nx}px)`;
        if (Math.abs(nx - before) > 0.05) moved = true;
      }
      // 左に流れ切った先頭を削除
      while (lane.length && lane[0].x + lane[0].w < -4) {
        lane[0].el.remove();
        lane.shift();
      }
      // 全員停止（＝待機中）ならループを止め、次のコメントで再開
      tickerRaf = lane.length && moved ? requestAnimationFrame(tickerStep) : null;
    }

    function stopTicker() {
      if (tickerRaf != null) { cancelAnimationFrame(tickerRaf); tickerRaf = null; }
      lane.forEach((c) => c.el.remove());
      lane = [];
    }

    function applySettings(s) {
      if (!s) return;
      SET = s;
      const root = document.documentElement.style;
      root.setProperty("--text", s.textColor);
      root.setProperty("--blue", s.blueColor);
      root.setProperty("--orange", s.orangeColor);
      root.setProperty("--accent", s.accentColor);
      root.setProperty("--radius", s.radius + "px");
      root.setProperty("--panel-alpha", (s.bgOpacity / 100).toString());
      const cfont = (s.comments && s.comments.fontSize) || 16;
      root.setProperty("--comment-size", cfont + "px");

      const w = $("wrap");
      w.style.top = w.style.bottom = w.style.left = w.style.right = "auto";
      const cmode = s.comments ? s.comments.mode : "list";
      const tickerOnly = VIEW === "comments" && cmode === "ticker";

      if (VIEW === "all") {
        // 全部入り：設定の配置・サイズ・拡大率を適用
        const top = s.position.includes("top");
        const right = s.position.includes("right");
        (top ? (w.style.top = s.offsetY + "px") : (w.style.bottom = s.offsetY + "px"));
        (right ? (w.style.right = s.offsetX + "px") : (w.style.left = s.offsetX + "px"));
        w.style.width = s.width + "px";
        w.style.transformOrigin = `${top ? "top" : "bottom"} ${right ? "right" : "left"}`;
        w.style.transform = `scale(${(s.scale || 100) / 100})`;
      } else {
        // 単独ウィンドウ：左上に固定し、配置・サイズはOBS側で行う
        w.style.top = "0"; w.style.left = "0";
        w.style.transform = "none"; w.style.transformOrigin = "top left";
        w.style.width = tickerOnly ? "100%" : s.width + "px";
      }
      // 横流れ：単独表示は画面全体の高さ（中央を1行で流す）、全部入りでは文字サイズに応じた帯
      $("ticker").style.height = tickerOnly ? "100vh" : Math.max(60, Math.round(cfont * 2.6)) + "px";

      // ラベル
      $("labelBlue").textContent = s.labels.blue;
      $("labelOrange").textContent = s.labels.orange;
      $("labelWait").textContent = s.labels.waiting;

      // 各コンポーネントの表示可否を決定
      const show = s.show;
      const c = s.comments || { show: true, mode: "list" };
      // VIEW で対象を絞る。all のときは設定のON/OFFも考慮。
      const want = (name) => {
        const inView = VIEW === "all" || VIEW === name ||
          (VIEW === "teams" && (name === "blue" || name === "orange" || name === "vs"));
        if (!inView) return false;
        if (VIEW !== "all") return true; // 単独表示は常に出す
        // 全部入りでは設定のON/OFF
        if (name === "blue") return show.blueTeam;
        if (name === "orange") return show.orangeTeam;
        if (name === "vs") return show.vs && show.blueTeam && show.orangeTeam;
        if (name === "waiting") return show.waiting;
        if (name === "comments") return c.show;
        if (name === "stats") return show.subs || show.viewers;
        return true;
      };

      $("statsRow").classList.toggle("hidden", !want("stats"));
      $("statSubs").classList.toggle("hidden", !show.subs);
      $("statViewers").classList.toggle("hidden", !show.viewers);
      $("panelBlue").classList.toggle("hidden", !want("blue"));
      $("panelOrange").classList.toggle("hidden", !want("orange"));
      $("vs").classList.toggle("hidden", !want("vs"));
      $("panelWait").classList.toggle("hidden", !want("waiting"));

      // コメント：モードに応じて一覧 or 横流れ
      const commentsVisible = want("comments");
      $("panelComments").classList.toggle("hidden", !(commentsVisible && cmode === "list"));
      const tickerVisible = commentsVisible && cmode === "ticker";
      $("ticker").classList.toggle("hidden", !tickerVisible);
      if (!tickerVisible) stopTicker(); // 横流れ以外に切り替えたら停止・掃除

      document.body.classList.toggle("no-avatars", !show.avatars);
      document.body.classList.toggle("no-numbers", !show.numbers);

      if (lastState) render(lastState);
      renderCommentList();
    }

    socket.on("state", (s) => { if (s.settings) applySettings(s.settings); render(s); });
    socket.on("settings", applySettings);
    socket.on("comment", (c) => {
      comments.push(c);
      if (comments.length > 60) comments.shift();
      if (SET && SET.comments.mode === "ticker") enqueueTicker(c);
      else renderCommentList();
    });
    socket.on("joined", () => {
      const p = $("panelWait");
      if (p.classList.contains("hidden")) return;
      p.classList.remove("flash"); void p.offsetWidth; p.classList.add("flash");
    });
  </script>
</body>
</html>
