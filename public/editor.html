<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>配信画面エディタ</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; height: 100vh; overflow: hidden; background: #0b0e16; color: #e8ecf5;
      font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif; display: grid;
      grid-template-columns: 248px 1fr 300px; grid-template-rows: 100vh; }
    a { color: #7aa0ff; }
    .pane { overflow-y: auto; padding: 12px; }
    .left { border-right: 1px solid #20283f; }
    .right { border-left: 1px solid #20283f; background: #0e1320; }
    .center { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #070910; min-width: 0; }

    h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #8ea3e0; margin: 14px 0 8px; }
    h2:first-child { margin-top: 0; }
    .muted { opacity: .55; font-size: 12px; }

    select, input[type=text], input[type=number], textarea {
      background: #161c30; border: 1px solid #2a3658; color: #fff; border-radius: 7px; padding: 6px 8px; font-size: 13px; width: 100%; }
    textarea { resize: vertical; min-height: 54px; font-family: inherit; }
    input[type=color] { width: 100%; height: 30px; padding: 0; border: 1px solid #2a3658; border-radius: 6px; background: #161c30; }
    input[type=range] { width: 100%; }
    input[type=checkbox] { width: 16px; height: 16px; }
    label.fld { display: block; font-size: 12px; opacity: .8; margin: 8px 0 3px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .chk { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 8px 0; }

    button { background: #2b6cff; color: #fff; border: none; cursor: pointer; border-radius: 7px;
      padding: 7px 10px; font-size: 12px; font-weight: 700; }
    button:hover { filter: brightness(1.12); }
    button.ghost { background: #232b45; }
    button.danger { background: #c0394b; }
    button.sm { padding: 4px 7px; font-size: 11px; }
    .btnrow { display: flex; gap: 6px; flex-wrap: wrap; }

    .palette { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .palette button { background: #1a2138; border: 1px solid #2a3658; padding: 10px 6px; font-size: 12px;
      display: flex; flex-direction: column; align-items: center; gap: 6px; color: #d7def0; font-weight: 600; }
    .palette button:hover { border-color: #3a4a78; background: #1e2742; }
    .ico { width: 20px; height: 20px; display: inline-block; flex: none; }
    .ico svg { width: 100%; height: 100%; display: block; stroke: currentColor; fill: none;
      stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    #palette .ico { color: #9fb4ff; }
    .btnrow .ico { width: 15px; height: 15px; vertical-align: -3px; margin-right: 5px; }
    .bggrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .bggrid button { height: 44px; border-radius: 8px; border: 1px solid #2a3658; cursor: pointer; padding: 0;
      overflow: hidden; color: #fff; font-size: 10px; font-weight: 700; text-shadow: 0 1px 3px #000, 0 0 4px #000; }
    .bggrid button:hover { outline: 2px solid #2b6cff; }

    .layers { list-style: none; padding: 0; margin: 0; }
    .layer { display: flex; align-items: center; gap: 6px; padding: 6px 8px; margin: 3px 0; border-radius: 7px;
      background: #141a2c; border: 1px solid #232b45; cursor: pointer; font-size: 12px; }
    .layer.sel { border-color: #2b6cff; background: #18213d; }
    .layer .lt { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .layer .lx { background: transparent; color: #f88; padding: 2px 5px; }
    .layer .lm { background: #232b45; padding: 2px 6px; }

    /* キャンバス */
    .stagewrap { position: relative; box-shadow: 0 20px 60px rgba(0,0,0,.6);
      background-color: #11161f;
      background-image:
        linear-gradient(45deg, rgba(255,255,255,.05) 25%, transparent 25%, transparent 75%, rgba(255,255,255,.05) 75%),
        linear-gradient(45deg, rgba(255,255,255,.05) 25%, transparent 25%, transparent 75%, rgba(255,255,255,.05) 75%);
      background-size: 26px 26px; background-position: 0 0, 13px 13px; }
    .stagewrap iframe { display: block; width: 100%; height: 100%; border: 0; background: transparent; pointer-events: none; }
    #overlay { position: absolute; inset: 0; }
    .box { position: absolute; border: 1px solid transparent; cursor: move; }
    .box:hover { border-color: rgba(122,160,255,.6); }
    .box.sel { border: 1.5px solid #2b6cff; box-shadow: 0 0 0 1px rgba(43,108,255,.3); }
    .box .tag { position: absolute; top: -18px; left: 0; font-size: 10px; background: #2b6cff; color: #fff;
      padding: 1px 5px; border-radius: 4px 4px 0 0; white-space: nowrap; opacity: 0; }
    .box.sel .tag, .box:hover .tag { opacity: 1; }
    .h { position: absolute; width: 10px; height: 10px; background: #fff; border: 1.5px solid #2b6cff; border-radius: 2px; }
    .h.nw { left: -5px; top: -5px; cursor: nwse-resize; }
    .h.ne { right: -5px; top: -5px; cursor: nesw-resize; }
    .h.sw { left: -5px; bottom: -5px; cursor: nesw-resize; }
    .h.se { right: -5px; bottom: -5px; cursor: nwse-resize; }
    .topbar { width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #0e1320; border-bottom: 1px solid #20283f; }
    .topbar .grow { flex: 1; }
    .pos { font-size: 11px; opacity: .6; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <!-- 左：シーン管理・部品・レイヤー -->
  <div class="pane left">
    <h2>シーン</h2>
    <select id="sceneSel"></select>
    <div class="btnrow" style="margin-top:8px">
      <button class="ghost sm" id="newScene">新規</button>
      <button class="ghost sm" id="dupScene">複製</button>
      <button class="ghost sm" id="renScene">名前変更</button>
      <button class="danger sm" id="delScene">削除</button>
    </div>

    <h2>部品を追加</h2>
    <div class="palette" id="palette"></div>

    <h2>テンプレートから新規シーン</h2>
    <div class="btnrow" id="tpl"></div>

    <h2>背景プリセット</h2>
    <div class="bggrid" id="bgPresets"></div>
    <button id="openBg" style="width:100%;margin-top:7px">背景の詳細設定・カスタム作成を開く</button>

    <h2>カラー（現在のシーンに適用）</h2>
    <div class="palette" id="palettes"></div>

    <h2>装飾・画像</h2>
    <div class="palette" id="decos"></div>
    <button class="ghost sm" id="upBtn" style="margin-top:6px; width:100%">画像をアップロードして追加</button>

    <h2>レイヤー（上=手前）</h2>
    <ul class="layers" id="layers"></ul>

    <h2>その他</h2>
    <div class="btnrow">
      <a href="/admin.html" style="text-decoration:none"><button class="ghost sm">管理画面</button></a>
      <button class="ghost sm" id="resetScenes">初期化</button>
    </div>
    <div class="muted" style="margin-top:10px">OBS: <code>/stream.html</code> をブラウザソース(1920×1080)に。</div>
  </div>

  <!-- 中央：キャンバス -->
  <div class="center">
    <div class="topbar">
      <strong style="font-size:13px">配信画面エディタ</strong>
      <span class="muted">ドラッグで移動・四隅で拡縮（Alt押しでスナップ解除）</span>
      <span class="grow"></span>
      <span class="pos" id="posInfo"></span>
    </div>
    <div style="flex:1; display:flex; align-items:center; justify-content:center; width:100%; min-height:0; padding:14px;">
      <div class="stagewrap" id="stagewrap">
        <iframe id="preview" src="/stream.html"></iframe>
        <div id="overlay"></div>
      </div>
    </div>
  </div>

  <!-- 右：プロパティ -->
  <div class="pane right">
    <div id="inspector"></div>
  </div>

  <script src="/socket.io.min.js"></script>
  <script>
    const socket = io();
    const $ = (id) => document.getElementById(id);
    const SNAP = 10;

    // シンプルな線画アイコン（currentColorで描画）
    const ICONS = {
      gameFrame: '<rect x="3" y="4" width="18" height="13" rx="2"/><path d="M9 21h6M12 17v4"/>',
      cameraFrame: '<path d="M8 6l1.4-2h5.2L16 6"/><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12.5" r="3.2"/>',
      text: '<path d="M5 5h14M12 5v14M9.5 19h5"/>',
      shape: '<rect x="4" y="5" width="16" height="14" rx="3"/>',
      image: '<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.7"/><path d="M21 16l-5-5L5 20"/>',
      stats: '<path d="M4 20h16"/><path d="M7 20v-6M12 20V7M17 20v-9"/>',
      participants: '<circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7"/>',
      comments: '<path d="M20 4H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3v3l4-3h9a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1z"/>',
      megaphone: '<path d="M4 10v4M4 12l11-5v10L4 12z"/><path d="M15 9a4 4 0 0 1 0 6"/><path d="M7 14v3a2 2 0 0 0 4 0v-1.5"/>',
      clock: '<circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/>',
    };
    const ico = (name) => `<span class="ico"><svg viewBox="0 0 24 24" aria-hidden="true">${ICONS[name] || ""}</svg></span>`;

    let scenesData = null, activeId = null, scene = null, selectedId = null;
    let scale = 1; // 表示px / 1920

    function active() { return scene; }
    function widget(id) { return scene ? scene.widgets.find((w) => w.id === id) : null; }

    socket.on("state", (s) => { if (s.scenes) onScenes(s.scenes); });
    socket.on("scenes", onScenes);

    function onScenes(d) {
      scenesData = d; activeId = d.activeId;
      scene = d.scenes.find((s) => s.id === activeId) || d.scenes[0];
      if (selectedId && !widget(selectedId)) selectedId = null;
      renderSceneSelect();
      renderLayers();
      renderOverlay();
      // 編集中（スライダー等を操作中）はインスペクタを作り直さない＝ドラッグが途切れない
      const editing = document.activeElement && $("inspector").contains(document.activeElement);
      if (!editing) renderInspector();
    }

    // ---- キャンバス寸法 ----
    function layout() {
      const wrap = $("stagewrap");
      const host = wrap.parentElement;
      const availW = host.clientWidth - 28, availH = host.clientHeight - 28;
      const s = Math.min(availW / 1920, availH / 1080);
      wrap.style.width = Math.round(1920 * s) + "px";
      wrap.style.height = Math.round(1080 * s) + "px";
      scale = s;
      renderOverlay();
    }
    window.addEventListener("resize", layout);

    // ---- 操作オーバーレイ（選択枠） ----
    function renderOverlay() {
      const ov = $("overlay");
      ov.innerHTML = "";
      if (!scene) return;
      for (const w of scene.widgets.slice().sort((a, b) => (a.z || 0) - (b.z || 0))) {
        const box = document.createElement("div");
        box.className = "box" + (w.id === selectedId ? " sel" : "");
        box.style.left = w.x * scale + "px";
        box.style.top = w.y * scale + "px";
        box.style.width = w.w * scale + "px";
        box.style.height = w.h * scale + "px";
        box.dataset.id = w.id;
        box.innerHTML = `<span class="tag">${typeLabel(w.type)}</span>` +
          (w.id === selectedId ? `<div class="h nw"></div><div class="h ne"></div><div class="h sw"></div><div class="h se"></div>` : "");
        ov.appendChild(box);
      }
    }

    // ---- ドラッグ移動 / リサイズ ----
    let drag = null;
    $("overlay").addEventListener("pointerdown", (e) => {
      const handle = e.target.closest(".h");
      const box = e.target.closest(".box");
      // 空白(部品以外)をクリックしたら選択解除 → 背景インスペクタを表示
      if (!box) {
        if (selectedId !== null) { selectedId = null; renderOverlay(); renderLayers(); renderInspector(); }
        return;
      }
      const id = box.dataset.id;
      selectedId = id;
      const w = widget(id);
      renderOverlay(); renderLayers(); renderInspector();
      e.preventDefault();
      const startX = e.clientX, startY = e.clientY;
      const o = { x: w.x, y: w.y, w: w.w, h: w.h };
      const mode = handle ? [...handle.classList].find((c) => ["nw", "ne", "sw", "se"].includes(c)) : "move";
      drag = { id, startX, startY, o, mode, cur: { ...o } };
      $("overlay").setPointerCapture(e.pointerId);
    });
    $("overlay").addEventListener("pointermove", (e) => {
      if (!drag) return;
      const dx = (e.clientX - drag.startX) / scale, dy = (e.clientY - drag.startY) / scale;
      const o = drag.o; let n = { ...o };
      const snap = (v) => (e.altKey ? Math.round(v) : Math.round(v / SNAP) * SNAP);
      if (drag.mode === "move") { n.x = snap(o.x + dx); n.y = snap(o.y + dy); }
      else {
        if (drag.mode.includes("e")) n.w = snap(o.w + dx);
        if (drag.mode.includes("s")) n.h = snap(o.h + dy);
        if (drag.mode.includes("w")) { n.x = snap(o.x + dx); n.w = snap(o.w - dx); }
        if (drag.mode.includes("n")) { n.y = snap(o.y + dy); n.h = snap(o.h - dy); }
        n.w = Math.max(40, n.w); n.h = Math.max(30, n.h);
      }
      n.x = Math.max(0, n.x); n.y = Math.max(0, n.y);
      drag.cur = n;
      // ローカルでボックスだけ即時移動（iframeはドロップ時に反映）
      const box = $("overlay").querySelector(`.box[data-id="${drag.id}"]`);
      if (box) { box.style.left = n.x * scale + "px"; box.style.top = n.y * scale + "px"; box.style.width = n.w * scale + "px"; box.style.height = n.h * scale + "px"; }
      $("posInfo").textContent = `x:${n.x} y:${n.y}  w:${n.w} h:${n.h}`;
    });
    $("overlay").addEventListener("pointerup", (e) => {
      if (!drag) return;
      const n = drag.cur;
      emitWidget({ id: drag.id, x: n.x, y: n.y, w: n.w, h: n.h });
      drag = null;
    });

    // ---- 送信 ----
    function emitWidget(patch) { socket.emit("widget:upsert", { sceneId: activeId, widget: patch }); }
    function emitScene(patch) { socket.emit("scene:update", { id: activeId, patch }); }

    // ---- シーン管理 ----
    function renderSceneSelect() {
      const sel = $("sceneSel");
      sel.innerHTML = scenesData.scenes.map((s) => `<option value="${s.id}" ${s.id === activeId ? "selected" : ""}>${escapeHtml(s.name)}</option>`).join("");
    }
    $("sceneSel").onchange = (e) => socket.emit("scene:activate", e.target.value);
    $("newScene").onclick = () => { const n = prompt("新しいシーン名", "新しいシーン"); if (n) socket.emit("scene:create", n); };
    $("dupScene").onclick = () => socket.emit("scene:duplicate", activeId);
    $("renScene").onclick = () => { const n = prompt("シーン名", scene.name); if (n) socket.emit("scene:rename", { id: activeId, name: n }); };
    $("delScene").onclick = () => { if (scenesData.scenes.length <= 1) return alert("最後の1シーンは削除できません"); if (confirm("このシーンを削除しますか？")) socket.emit("scene:delete", activeId); };
    $("resetScenes").onclick = () => { if (confirm("全シーンを初期状態に戻しますか？")) socket.emit("scene:reset"); };

    // ---- 部品追加 ----
    const ADD_DEFAULTS = {
      gameFrame: { w: 1280, h: 720, style: { borderWidth: 3, borderColor: "#1e6bff", radius: 12, shadow: true }, config: { showLabel: false, label: "GAME" } },
      cameraFrame: { w: 480, h: 270, style: { borderWidth: 3, borderColor: "#5cffc9", radius: 12, shadow: true }, config: { showLabel: true, label: "CAM" } },
      text: { w: 480, h: 70, style: { color: "#ffffff", fontSize: 36, fontWeight: 800, align: "left", bg: "transparent" }, config: { text: "テキスト" } },
      shape: { w: 480, h: 240, style: { bg: "rgba(17,20,33,0.85)", radius: 12, borderWidth: 0, borderColor: "rgba(255,255,255,0.15)", shadow: true }, config: {} },
      image: { w: 320, h: 200, style: { radius: 0 }, config: { src: "", fit: "contain" } },
      stats: { w: 480, h: 96, style: { accent: "#5cffc9", bgOpacity: 90, radius: 12 }, config: { showSubs: true, showViewers: true } },
      participants: { w: 480, h: 520, style: { blue: "#1e6bff", orange: "#ff7a18", accent: "#5cffc9", bgOpacity: 90, radius: 12 }, config: { show: "teams", showAvatars: true, showNumbers: true, showEmpty: false } },
      comments: { w: 480, h: 240, style: { accent: "#5cffc9", bgOpacity: 85, radius: 12, fontSize: 18 }, config: { mode: "list", max: 8, speed: 12, showPhoto: true } },
    };
    const PALETTE_ITEMS = [
      ["gameFrame", "ゲーム枠"], ["cameraFrame", "カメラ枠"], ["text", "テキスト"], ["shape", "図形パネル"],
      ["image", "画像"], ["stats", "統計"], ["participants", "参加者"], ["comments", "コメント"],
    ];
    $("palette").innerHTML = PALETTE_ITEMS.map(([t, l]) => `<button data-add="${t}">${ico(t)}<span>${l}</span></button>`).join("");
    $("palette").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-add]"); if (!btn) return;
      const t = btn.dataset.add;
      const d = ADD_DEFAULTS[t];
      const w = { type: t, x: Math.round((1920 - d.w) / 2), y: Math.round((1080 - d.h) / 2), w: d.w, h: d.h, style: { ...d.style }, config: { ...d.config } };
      socket.emit("widget:upsert", { sceneId: activeId, widget: w });
    });

    // ---- レイヤー ----
    function renderLayers() {
      const ul = $("layers");
      if (!scene) return (ul.innerHTML = "");
      const ws = scene.widgets.slice().sort((a, b) => (b.z || 0) - (a.z || 0)); // 手前が上
      ul.innerHTML = ws.map((w) =>
        `<li class="layer ${w.id === selectedId ? "sel" : ""}" data-id="${w.id}">
          <span class="lt">${typeLabel(w.type)}${labelHint(w)}</span>
          <button class="lm sm" data-up="${w.id}">▲</button>
          <button class="lm sm" data-down="${w.id}">▼</button>
          <button class="lx sm" data-del="${w.id}">✕</button>
        </li>`).join("");
    }
    $("layers").addEventListener("click", (e) => {
      const up = e.target.dataset.up, down = e.target.dataset.down, del = e.target.dataset.del;
      const li = e.target.closest(".layer");
      if (del) { socket.emit("widget:remove", { sceneId: activeId, widgetId: del }); if (selectedId === del) selectedId = null; return; }
      if (up || down) return reorder(up || down, up ? -1 : 1);
      if (li) { selectedId = li.dataset.id; renderOverlay(); renderLayers(); renderInspector(); }
    });
    function reorder(id, dir) {
      const ordTopFirst = scene.widgets.slice().sort((a, b) => (b.z || 0) - (a.z || 0)).map((w) => w.id);
      const i = ordTopFirst.indexOf(id), j = i + dir;
      if (j < 0 || j >= ordTopFirst.length) return;
      [ordTopFirst[i], ordTopFirst[j]] = [ordTopFirst[j], ordTopFirst[i]];
      // サーバーは ids 先頭=z小(奥)。表示は手前が上なので反転して送る。
      socket.emit("widget:reorder", { sceneId: activeId, ids: ordTopFirst.slice().reverse() });
    }

    // ---- プロパティ ----
    function renderInspector() {
      const box = $("inspector");
      if (!scene) return (box.innerHTML = "");
      if (!selectedId || !widget(selectedId)) { box.innerHTML = sceneInspector(); bindSceneInspector(); return; }
      const w = widget(selectedId);
      let h = `<h2>${typeLabel(w.type)}</h2>`;
      h += `<div class="row2">${numF("x", w.x)}${numF("y", w.y)}${numF("w", w.w)}${numF("h", w.h)}</div>`;
      h += typeInspector(w);
      h += `<div style="margin-top:14px"><button class="danger sm" id="delW">この部品を削除</button></div>`;
      box.innerHTML = h;
      bindInspector(w);
    }

    function numF(k, v) { return `<div><label class="fld">${k.toUpperCase()}</label><input type="number" data-pos="${k}" value="${v}"></div>`; }
    function txtF(label, path, v) { return `<label class="fld">${label}</label><input type="text" data-p="${path}" value="${escapeAttr(v ?? "")}">`; }
    function areaF(label, path, v) { return `<label class="fld">${label}</label><textarea data-p="${path}">${escapeHtml(v ?? "")}</textarea>`; }
    function colF(label, path, v) { return `<label class="fld">${label}</label><input type="color" data-p="${path}" value="${v || "#ffffff"}">`; }
    function rngF(label, path, v, min, max) { return `<label class="fld">${label}: <span class="rv">${v}</span></label><input type="range" data-p="${path}" min="${min}" max="${max}" value="${v}">`; }
    function chkF(label, path, v) { return `<label class="chk"><input type="checkbox" data-p="${path}" ${v ? "checked" : ""}>${label}</label>`; }
    function selF(label, path, v, opts) { return `<label class="fld">${label}</label><select data-p="${path}">${opts.map((o) => `<option value="${escapeAttr(o[0])}" ${o[0] === v ? "selected" : ""}>${o[1]}</option>`).join("")}</select>`; }

    function typeInspector(w) {
      const s = w.style || {}, c = w.config || {};
      switch (w.type) {
        case "text":
          return areaF("テキスト", "config.text", c.text) + rngF("文字サイズ", "style.fontSize", s.fontSize || 28, 12, 120)
            + selF("太さ", "style.fontWeight", String(s.fontWeight || 700), [["400", "標準"], ["700", "太字"], ["800", "極太"], ["900", "最太"]])
            + selF("フォント", "style.fontFamily", s.fontFamily || "", [["", "標準"], ['"Arial Black","Hiragino Sans",sans-serif', "極太(Arial Black)"], ['"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif', "丸ゴシック"], ['Georgia,"Hiragino Mincho ProN",serif', "明朝/セリフ"], ['Impact,"Hiragino Sans",sans-serif', "Impact"]])
            + selF("揃え", "style.align", s.align || "left", [["left", "左"], ["center", "中央"], ["right", "右"]])
            + colF("文字色", "style.color", s.color) + chkF("発光(ネオン)", "style.glow", s.glow) + txtF("背景(色/transparent)", "style.bg", s.bg);
        case "gameFrame": case "cameraFrame":
          return rngF("枠の太さ", "style.borderWidth", s.borderWidth ?? 3, 0, 12) + colF("枠の色", "style.borderColor", s.borderColor)
            + rngF("角丸", "style.radius", s.radius || 0, 0, 40) + chkF("影をつける", "style.shadow", s.shadow) + chkF("発光(ネオン)", "style.glow", s.glow)
            + chkF("ラベルを表示", "config.showLabel", c.showLabel) + txtF("ラベル文字", "config.label", c.label);
        case "shape":
          return txtF("背景(色/グラデ)", "style.bg", s.bg) + rngF("角丸", "style.radius", s.radius || 12, 0, 60)
            + rngF("ぼかし", "style.blur", s.blur || 0, 0, 60) + rngF("不透明度", "style.opacity", s.opacity ?? 100, 0, 100)
            + rngF("枠の太さ", "style.borderWidth", s.borderWidth || 0, 0, 12) + colF("枠の色", "style.borderColor", s.borderColor)
            + chkF("影をつける", "style.shadow", s.shadow) + chkF("発光(ネオン)", "style.glow", s.glow);
        case "image":
          return txtF("画像URL", "config.src", c.src) + `<button class="ghost sm" id="upImg" style="width:100%;margin-top:6px">画像をアップロード</button>`
            + selF("フィット", "config.fit", c.fit || "contain", [["contain", "全体表示"], ["cover", "切り抜き"], ["fill", "引き伸ばし"]]) + rngF("角丸", "style.radius", s.radius || 0, 0, 60);
        case "stats":
          return chkF("登録者数", "config.showSubs", c.showSubs !== false) + chkF("同時視聴者数", "config.showViewers", c.showViewers !== false)
            + colF("アクセント色", "style.accent", s.accent) + rngF("背景の不透明度", "style.bgOpacity", s.bgOpacity ?? 90, 0, 100) + rngF("角丸", "style.radius", s.radius || 12, 0, 40);
        case "participants":
          return selF("表示対象", "config.show", c.show || "teams", [["teams", "両チーム"], ["all", "両チーム+待機列"], ["queue", "待機列のみ"], ["blue", "青のみ"], ["orange", "オレンジのみ"]])
            + chkF("アイコン", "config.showAvatars", c.showAvatars !== false) + chkF("順番番号", "config.showNumbers", c.showNumbers !== false) + chkF("空きスロット", "config.showEmpty", c.showEmpty)
            + rngF("背景の不透明度", "style.bgOpacity", s.bgOpacity ?? 90, 0, 100) + rngF("角丸", "style.radius", s.radius || 12, 0, 40);
        case "comments":
          return selF("表示形式", "config.mode", c.mode || "list", [["list", "縦の一覧"], ["ticker", "横に流れる"]])
            + rngF("一覧の件数", "config.max", c.max || 8, 3, 20) + rngF("流れる速さ(秒)", "config.speed", c.speed || 12, 5, 30)
            + rngF("文字サイズ", "style.fontSize", s.fontSize || 18, 12, 80) + chkF("アイコン", "config.showPhoto", c.showPhoto !== false)
            + colF("文字色", "style.color", s.color || "#ffffff") + colF("名前の色", "style.accent", s.accent || "#9fd0ff")
            + colF("背景色", "style.bgColor", s.bgColor || "#11141f") + rngF("背景の不透明度", "style.bgOpacity", s.bgOpacity ?? 85, 0, 100)
            + rngF("角丸", "style.radius", s.radius || 12, 0, 40);
      }
      return "";
    }

    function bindInspector(w) {
      $("inspector").querySelectorAll("[data-pos]").forEach((el) => el.addEventListener("change", () => {
        emitWidget({ id: w.id, [el.dataset.pos]: Number(el.value) });
      }));
      const throttledEmit = throttle((patch) => emitWidget({ id: w.id, ...patch }), 70);
      $("inspector").querySelectorAll("[data-p]").forEach((el) => {
        el.addEventListener("input", () => {
          let v = el.type === "checkbox" ? el.checked : (el.type === "number" || el.type === "range") ? Number(el.value) : el.value;
          if (el.type === "range") { const rv = el.previousElementSibling && el.previousElementSibling.querySelector(".rv"); if (rv) rv.textContent = el.value; }
          const patch = pathToObj(el.dataset.p, v);
          // スライダーは連続発火するので間引き、それ以外は即時
          if (el.type === "range") throttledEmit(patch);
          else emitWidget({ id: w.id, ...patch });
        });
        // スライダーは離した瞬間に最終値を確実に送る
        if (el.type === "range") el.addEventListener("change", () => emitWidget({ id: w.id, ...pathToObj(el.dataset.p, Number(el.value)) }));
      });
      $("delW").onclick = () => { socket.emit("widget:remove", { sceneId: activeId, widgetId: w.id }); selectedId = null; };
      const up = $("upImg");
      if (up) up.onclick = () => pickAndUpload((url) => emitWidget({ id: w.id, config: { src: url } }));
    }

    function sceneInspector() {
      const b = (scene && scene.background) || { type: "color", color: "#0b0e16" };
      return `<h2>背景（シーン共通）</h2>
        <div class="muted" style="margin-bottom:6px">左の「背景プリセット」から選ぶのが簡単です。ここでは細かく指定できます。</div>
        ${selF("種類", "background.type", b.type || "color", [["color", "単色"], ["gradient", "グラデーション"], ["css", "プリセット/CSS"], ["image", "画像"], ["transparent", "透明"]])}
        ${colF("背景色", "background.color", b.color || "#0b0e16")}
        ${txtF("グラデーションCSS", "background.gradient", b.gradient)}
        ${areaF("背景CSS（上級）", "background.css", b.css)}
        ${txtF("画像URL", "background.image", b.image)}
        <button class="ghost sm" id="upBg" style="width:100%;margin-top:6px">背景画像をアップロード</button>

        <h2 style="margin-top:18px">背景カスタム作成</h2>
        <div class="muted" style="margin-bottom:4px">色と模様を選ぶと、その場で背景が作られます。</div>
        <label class="fld">ベース</label>
        <select id="bbType"><option value="gradient">グラデーション</option><option value="solid">単色</option></select>
        <div class="row2">
          <div><label class="fld">色1</label><input type="color" id="bbC1" value="#ff9ec7"></div>
          <div><label class="fld">色2</label><input type="color" id="bbC2" value="#d6e9ff"></div>
        </div>
        <label class="fld">角度: <span id="bbAngV">135</span>°</label><input type="range" id="bbAng" min="0" max="360" value="135">
        <label class="fld">模様</label>
        <select id="bbPat">
          <option value="none">なし</option><option value="dots">水玉</option><option value="hearts">ハート</option>
          <option value="stars">星</option><option value="stripes">ストライプ</option><option value="check">チェック</option><option value="grid">格子</option>
        </select>
        <div class="row2">
          <div><label class="fld">模様の色</label><input type="color" id="bbPc" value="#ffffff"></div>
          <div><label class="fld">濃さ: <span id="bbOpV">50</span></label><input type="range" id="bbOp" min="0" max="100" value="50"></div>
        </div>
        <label class="fld">模様サイズ: <span id="bbSzV">40</span></label><input type="range" id="bbSz" min="16" max="140" value="40">
        <div class="muted" style="margin-top:14px">部品を選ぶと、ここで色・サイズ・内容を編集できます。</div>`;
    }
    function bindSceneInspector() {
      $("inspector").querySelectorAll("[data-p]").forEach((el) => el.addEventListener("change", () => {
        const v = el.type === "checkbox" ? el.checked : el.value;
        const p = el.dataset.p;
        const patch = pathToObj(p, v);
        // 単色/グラデ/画像/透明 に変えたら、プリセットCSS(最優先)を解除して反映されるようにする
        if (p.startsWith("background.") && p !== "background.css" && !(p === "background.type" && v === "css")) patch.background.css = "";
        emitScene(patch);
      }));
      const up = $("upBg");
      if (up) up.onclick = () => pickAndUpload((url) => emitScene({ background: { type: "image", image: url } }));

      // 背景カスタムビルダー
      if ($("bbType")) {
        const applyBg = throttle(() => {
          const type = $("bbType").value, c1 = $("bbC1").value, c2 = $("bbC2").value, ang = $("bbAng").value;
          const pat = $("bbPat").value, pc = $("bbPc").value, op = +$("bbOp").value, sz = +$("bbSz").value;
          $("bbAngV").textContent = ang; $("bbOpV").textContent = op; $("bbSzV").textContent = sz;
          const base = type === "gradient" ? `linear-gradient(${ang}deg, ${c1}, ${c2})` : c1;
          const p = patternLayer(pat, hexA(pc, op / 100), sz);
          const css = p ? `${p}, ${base}` : base;
          emitScene({ background: { type: "css", css, image: "" } });
        }, 70);
        ["bbType", "bbC1", "bbC2", "bbAng", "bbPat", "bbPc", "bbOp", "bbSz"].forEach((id) => $(id).addEventListener("input", applyBg));
      }
    }

    // ---- テンプレート / カラー / 装飾 / アップロード ----
    const TPLS = [["match", "試合中", "gameFrame"], ["recruit", "参加募集", "megaphone"], ["starting", "開始前", "clock"]];
    const PALS = [["rl", "RL", "#5cffc9"], ["neon", "ネオン", "#19e6ff"], ["sunset", "夕焼け", "#ffb020"], ["mono", "モノ", "#c9ccd6"]];
    // 背景生成ヘルパー（プリセット・カスタムビルダー共通）
    const hexA = (hex, a) => {
      const m = /^#?([0-9a-f]{6})$/i.exec(hex || "");
      if (!m) return hex || "#fff";
      const n = parseInt(m[1], 16);
      return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
    };
    const svgUri = (svg) => `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
    const heartSvg = (c) => `<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 32 32'><path d='M16 27C16 27 4 19.5 4 11.6 4 7.4 7 5 10.3 5 12.7 5 14.8 6.4 16 8.6 17.2 6.4 19.3 5 21.7 5 25 5 28 7.4 28 11.6 28 19.5 16 27 16 27Z' fill='${c}'/></svg>`;
    const starSvg = (c) => `<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 32 32'><path d='M16 3l3.8 8.6 9.2.8-7 6.1 2.1 9.1L16 21.9 7.9 27.6 10 18.5 3 12.4l9.2-.8z' fill='${c}'/></svg>`;
    function patternLayer(kind, color, size) {
      const r = Math.max(1.5, size * 0.08);
      switch (kind) {
        case "dots": return `radial-gradient(${color} ${r}px, transparent ${r + 1}px) 0 0 / ${size}px ${size}px`;
        case "grid": return `linear-gradient(${color} 1px,transparent 1px) 0 0/${size}px ${size}px,linear-gradient(90deg,${color} 1px,transparent 1px) 0 0/${size}px ${size}px`;
        case "stripes": return `repeating-linear-gradient(45deg,${color} 0 ${size / 2}px,transparent ${size / 2}px ${size}px)`;
        case "check": return `linear-gradient(${color} 50%,transparent 50%) 0 0/${size}px ${size}px,linear-gradient(90deg,${color} 50%,transparent 50%) 0 0/${size}px ${size}px`;
        case "hearts": return `${svgUri(heartSvg(color))} 0 0 / ${size}px ${size}px`;
        case "stars": return `${svgUri(starSvg(color))} 0 0 / ${size}px ${size}px`;
        default: return "";
      }
    }

    // 背景プリセット（ネオン/グラデ/パターン/ポップ）。クリックで現在シーンの背景CSSに適用。
    const BG_PRESETS = [
      ["ネオン紫", "radial-gradient(60% 80% at 20% 10%,#3a1d6e 0,transparent 60%),radial-gradient(50% 60% at 90% 20%,#6d2bb0 0,transparent 55%),linear-gradient(160deg,#140a24,#080612)"],
      ["ネオン青", "radial-gradient(60% 80% at 15% 10%,#14346e 0,transparent 60%),radial-gradient(50% 60% at 85% 30%,#1e6bff 0,transparent 50%),linear-gradient(160deg,#08101f,#05070d)"],
      ["ピンク×シアン", "radial-gradient(50% 60% at 10% 90%,#ff3ca6 0,transparent 55%),radial-gradient(50% 60% at 90% 10%,#19e6ff 0,transparent 55%),#0a0612"],
      ["オーロラ", "linear-gradient(120deg,#0a2a43,#1b3b8a 35%,#6d2bb0 70%,#ff3ca6)"],
      ["サンセット", "linear-gradient(180deg,#241433,#7a2b4a 55%,#ff7a18)"],
      ["RLグラデ", "linear-gradient(135deg,#1e6bff,#0b1430 55%,#ff7a18)"],
      ["ディープ", "radial-gradient(120% 120% at 50% 0%,#16243f,#070a12)"],
      ["グリッド", "linear-gradient(rgba(124,160,255,.12) 1px,transparent 1px) 0 0/44px 44px,linear-gradient(90deg,rgba(124,160,255,.12) 1px,transparent 1px) 0 0/44px 44px,#0a0e18"],
      ["ドット", "radial-gradient(rgba(124,160,255,.18) 1.5px,transparent 1.6px) 0 0/26px 26px,#0a0e18"],
      ["ストライプ", "repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0 14px,transparent 14px 28px),linear-gradient(160deg,#10141f,#0b0e16)"],
      ["カーボン", "repeating-linear-gradient(45deg,#0d111b 0 6px,#0a0e16 6px 12px)"],
      ["スポット", "radial-gradient(60% 50% at 50% 0%,rgba(92,255,201,.18) 0,transparent 60%),#07090f"],
      ["ゆめかわ", "linear-gradient(135deg,#ffd1f0,#d9e6ff 50%,#d6fff4)"],
      ["パステル虹", "linear-gradient(120deg,#ffd1dc,#ffe9c7 30%,#d6ffd9 60%,#d1ecff)"],
      ["ピンク水玉", `${patternLayer("dots", hexA("#ffffff", 0.55), 30)}, linear-gradient(135deg,#ff9ec7,#ff77b0)`],
      ["ミントポップ", `${patternLayer("dots", hexA("#ffffff", 0.5), 28)}, linear-gradient(135deg,#9ff0e0,#7fd6ff)`],
      ["ラベンダー", "linear-gradient(160deg,#e6d8ff,#c9b3ff 60%,#ffd1f0)"],
      ["ハート", `${patternLayer("hearts", hexA("#ffffff", 0.5), 46)}, linear-gradient(135deg,#ff9ec7,#ffb3d1)`],
      ["きらきら", `${patternLayer("stars", hexA("#ffffff", 0.65), 50)}, linear-gradient(135deg,#ffe0f0,#d9c2ff)`],
      ["ギンガム", `${patternLayer("check", hexA("#ff77b0", 0.35), 44)}, #fff0f6`],
    ];
    $("bgPresets").innerHTML = BG_PRESETS.map(([l, css], i) => `<button data-bg="${i}" style="background:${css}">${l}</button>`).join("");
    $("bgPresets").addEventListener("click", (e) => {
      const b = e.target.closest("[data-bg]"); if (!b) return;
      emitScene({ background: { type: "css", css: BG_PRESETS[+b.dataset.bg][1], image: "" } });
    });

    // 「背景の詳細設定・カスタム作成を開く」= 選択解除して背景インスペクタを表示
    function showBackgroundPanel() { selectedId = null; renderOverlay(); renderLayers(); renderInspector(); }
    $("openBg").onclick = showBackgroundPanel;

    // 装飾（SVG画像 / 発光シェイプ）。各要素は完成ウィジェット定義。
    const DECOS = [
      { label: "コーナー", w: { type: "image", x: 60, y: 60, w: 220, h: 220, style: { radius: 0 }, config: { src: "/assets/deco-corner.svg", fit: "contain" } } },
      { label: "下帯", w: { type: "image", x: 560, y: 920, w: 800, h: 120, style: { radius: 0 }, config: { src: "/assets/deco-bar.svg", fit: "fill" } } },
      { label: "バッジ", w: { type: "image", x: 90, y: 90, w: 180, h: 200, style: { radius: 0 }, config: { src: "/assets/deco-badge.svg", fit: "contain" } } },
      { label: "発光・青", w: { type: "shape", x: 120, y: 160, w: 560, h: 560, style: { bg: "radial-gradient(circle,rgba(30,107,255,.55),transparent 70%)", radius: 280, borderWidth: 0, blur: 30 } } },
      { label: "発光・シアン", w: { type: "shape", x: 1240, y: 120, w: 560, h: 560, style: { bg: "radial-gradient(circle,rgba(92,255,201,.5),transparent 70%)", radius: 280, borderWidth: 0, blur: 30 } } },
      { label: "発光・ピンク", w: { type: "shape", x: 680, y: 480, w: 620, h: 620, style: { bg: "radial-gradient(circle,rgba(255,60,166,.5),transparent 70%)", radius: 310, borderWidth: 0, blur: 34 } } },
      { label: "ネオン線", w: { type: "shape", x: 660, y: 540, w: 600, h: 6, style: { bg: "linear-gradient(90deg,#1e6bff,#ff7a18)", radius: 3, borderWidth: 0, glow: true, borderColor: "#1e6bff" } } },
      { label: "サイド帯", w: { type: "shape", x: 0, y: 0, w: 520, h: 1080, style: { bg: "linear-gradient(180deg,rgba(13,18,32,.92),rgba(8,10,18,.92))", radius: 0, borderWidth: 0 } } },
    ];

    $("tpl").innerHTML = TPLS.map(([k, l, i]) => `<button class="ghost sm" data-tpl="${k}">${ico(i)}${l}</button>`).join("");
    $("tpl").addEventListener("click", (e) => { const b = e.target.closest("[data-tpl]"); if (b) socket.emit("scene:newFromTemplate", b.dataset.tpl); });

    $("palettes").innerHTML = PALS.map(([k, l, c]) =>
      `<button data-pal="${k}" style="display:flex;align-items:center;gap:6px;justify-content:center"><span style="width:12px;height:12px;border-radius:3px;background:${c}"></span>${l}</button>`).join("");
    $("palettes").addEventListener("click", (e) => { const b = e.target.closest("[data-pal]"); if (b) socket.emit("scene:applyPalette", b.dataset.pal); });

    $("decos").innerHTML = DECOS.map((d, i) => `<button data-deco="${i}">${d.label}</button>`).join("");
    $("decos").addEventListener("click", (e) => {
      const b = e.target.closest("[data-deco]"); if (!b) return;
      const w = JSON.parse(JSON.stringify(DECOS[+b.dataset.deco].w));
      socket.emit("widget:upsert", { sceneId: activeId, widget: w });
    });

    $("upBtn").onclick = () => pickAndUpload((url) =>
      socket.emit("widget:upsert", { sceneId: activeId, widget: { type: "image", x: 760, y: 440, w: 400, h: 225, style: { radius: 8 }, config: { src: url, fit: "contain" } } }));

    async function uploadFile(file) {
      const res = await fetch("/upload", { method: "POST", headers: { "Content-Type": file.type || "application/octet-stream" }, body: file });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return (await res.json()).url;
    }
    function pickAndUpload(cb) {
      const inp = document.createElement("input");
      inp.type = "file"; inp.accept = "image/*";
      inp.onchange = async () => { const f = inp.files[0]; if (!f) return; try { cb(await uploadFile(f)); } catch (e) { alert("アップロード失敗: " + e.message); } };
      inp.click();
    }

    // ---- helpers ----
    // 末尾呼び出しを保証するスロットル（スライダーの最終値を取りこぼさない）。
    function throttle(fn, ms) {
      let last = 0, timer = null, lastArgs = null;
      return (...args) => {
        lastArgs = args;
        const now = Date.now(), remain = ms - (now - last);
        if (remain <= 0) { last = now; fn(...args); }
        else { clearTimeout(timer); timer = setTimeout(() => { last = Date.now(); fn(...lastArgs); }, remain); }
      };
    }
    function pathToObj(path, value) {
      const keys = path.split("."); const root = {}; let o = root;
      for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]] = {};
      o[keys[keys.length - 1]] = value; return root;
    }
    function typeLabel(t) {
      return { gameFrame: "ゲーム枠", cameraFrame: "カメラ枠", text: "テキスト", shape: "図形パネル", image: "画像", stats: "統計", participants: "参加者", comments: "コメント" }[t] || t;
    }
    function labelHint(w) {
      if (w.type === "text" && w.config?.text) return "「" + w.config.text.slice(0, 8) + "」";
      if (w.type === "participants") return "(" + (w.config?.show || "teams") + ")";
      if (w.type === "comments") return "(" + (w.config?.mode || "list") + ")";
      return "";
    }
    function escapeHtml(s) { return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
    function escapeAttr(s) { return String(s).replace(/"/g, "&quot;"); }

    layout();
  </script>
